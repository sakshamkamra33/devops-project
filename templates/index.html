<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            color: #22c55e;
        }

        .version {
            color: #38bdf8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 DevOps Dashboard</h1>
        <p class="subtitle">CI/CD + Docker + GitHub Actions + Render</p>

        <div class="card">
            <h2>Status</h2>
            <p class="status" id="status">Loading...</p>
            <p class="version" id="version"></p>
            <button onclick="loadStatus()">Refresh</button>
        </div>

        <div class="card">
            <h2>About</h2>
            <p id="about">Loading...</p>
        </div>
    </div>

    <script>
        async function loadStatus() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('status').innerText = data.status;
            document.getElementById('version').innerText = "Version: " + data.version;
        }

        async function loadAbout() {
            const res = await fetch('/about');
            const data = await res.json();
            document.getElementById('about').innerText = data.message;
        }

        loadStatus();
        loadAbout();
    </script>

</body>
</html>
