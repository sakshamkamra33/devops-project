<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Final Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
}

/* LOGIN SCREEN */
#login {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
}

input {
    padding: 10px;
    margin: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

/* DASHBOARD */
#dashboard {
    display: none;
}

.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    position: fixed;
    padding: 20px;
}

.main {
    margin-left: 240px;
    padding: 20px;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
}

.chart, .logs, .timeline {
    margin-top: 30px;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

.logs {
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>🔐 DevOps Login</h2>
        <input placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button onclick="enter()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
    <h2>🚀 DevOps</h2>
    <p>Dashboard</p>
    <p>Deployments</p>
    <p>Metrics</p>
    <p>Logs</p>
</div>

<div class="main">

<h2>Final DevOps Dashboard</h2>

<div class="cards">
    <div class="card"><h4>Status</h4><p id="status"></p></div>
    <div class="card"><h4>Version</h4><p id="version"></p></div>
    <div class="card"><h4>Uptime</h4><p>99.99%</p></div>
    <div class="card"><h4>Env</h4><p>Production</p></div>
</div>

<div class="chart">
    <h3>API Metrics</h3>
    <canvas id="chart"></canvas>
</div>

<div class="timeline">
    <h3>Deployment Timeline</h3>
    <p>✔ Code pushed</p>
    <p>✔ Tests passed</p>
    <p>✔ Docker built</p>
    <p>✔ Deployed on Render</p>
</div>

<div class="logs" id="logs"></div>

</div>
</div>

<script>
function enter() {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
    generateLogs();
}

/* Load API */
async function loadData() {
    const res = await fetch('/status');
    const data = await res.json();
    document.getElementById('status').innerText = data.status;
    document.getElementById('version').innerText = data.version;
}

/* Chart */
new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: ["1","2","3","4","5"],
        datasets: [{
            data: [100, 80, 120, 90, 70],
            borderColor: "#22c55e"
        }]
    }
});

/* Logs */
function generateLogs() {
    const logs = document.getElementById("logs");
    const msgs = ["Deploying...", "Running tests...", "Building Docker...", "Live!"];
    let i = 0;

    setInterval(() => {
        if (i < msgs.length) {
            logs.innerHTML += "<br>" + msgs[i];
            i++;
        }
    }, 1000);
}
</script>

</body>
</html>
