<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
    background: #0f172a;
    color: white;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #020617;
    padding: 20px;
    height: 100vh;
}

.sidebar h2 {
    margin-bottom: 40px;
}

.sidebar a {
    display: block;
    margin: 15px 0;
    color: #94a3b8;
    text-decoration: none;
}

.sidebar a:hover {
    color: white;
}

/* Main */
.main {
    flex: 1;
    padding: 20px 30px;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.badge {
    background: #22c55e;
    padding: 5px 10px;
    border-radius: 10px;
    color: black;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 200px;
}

/* Status dot */
.status-dot {
    height: 10px;
    width: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
}

.running {
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
}

/* Logs */
.logs {
    margin-top: 30px;
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    font-family: monospace;
    height: 200px;
    overflow-y: auto;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🚀 DevOps</h2>
    <a href="#">Dashboard</a>
    <a href="#">Deployments</a>
    <a href="#">Logs</a>
    <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Navbar -->
    <div class="navbar">
        <h2>Production Dashboard</h2>
        <div class="badge">LIVE</div>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h4>Status</h4>
            <p><span id="dot" class="status-dot"></span><span id="status">Loading...</span></p>
        </div>

        <div class="card">
            <h4>Version</h4>
            <p id="version">--</p>
        </div>

        <div class="card">
            <h4>Uptime</h4>
            <p>99.98%</p>
        </div>

        <div class="card">
            <h4>Environment</h4>
            <p>Production</p>
        </div>
    </div>

    <!-- About -->
    <div style="margin-top:30px;">
        <h3>About</h3>
        <p id="about">Loading...</p>
    </div>

    <!-- Logs -->
    <div class="logs" id="logs">
        Initializing logs...
    </div>

</div>

<script>
async function loadData() {
    const res = await fetch('/status');
    const data = await res.json();

    document.getElementById('status').innerText = data.status;
    document.getElementById('version').innerText = data.version;

    const dot = document.getElementById('dot');
    if (data.status.toLowerCase() === "running") {
        dot.classList.add("running");
    }

    const aboutRes = await fetch('/about');
    const aboutData = await aboutRes.json();
    document.getElementById('about').innerText = aboutData.message;
}

/* Fake logs (for realism) */
function generateLogs() {
    const logs = document.getElementById("logs");

    const messages = [
        "🚀 Deploy started...",
        "📦 Building Docker image...",
        "✅ Tests passed",
        "📡 Pushing to registry...",
        "🌍 Deploying to Render...",
        "✅ Service is live",
        "📊 Monitoring active..."
    ];

    let i = 0;

    setInterval(() => {
        if (i < messages.length) {
            logs.innerHTML += "<br>" + messages[i];
            logs.scrollTop = logs.scrollHeight;
            i++;
        }
    }, 1500);
}

loadData();
generateLogs();
</script>

</body>
</html>
