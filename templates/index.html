<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
    background: #0f172a;
    color: white;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 40px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    text-decoration: none;
    margin: 15px 0;
}

.sidebar a:hover {
    color: white;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

.header {
    font-size: 28px;
    margin-bottom: 20px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.card h3 {
    margin-bottom: 10px;
}

/* Status dot */
.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
}

.running {
    background: #22c55e;
    box-shadow: 0 0 10px #22c55e;
}

/* Big section */
.section {
    margin-top: 30px;
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🚀 DevOps</h2>
    <a href="#">Dashboard</a>
    <a href="#">Status</a>
    <a href="#">Logs</a>
    <a href="#">Settings</a>
</div>

<div class="main">

    <div class="header">Production Dashboard</div>

    <div class="cards">
        <div class="card">
            <h3>Status</h3>
            <p>
                <span id="dot" class="status-dot"></span>
                <span id="status">Loading...</span>
            </p>
        </div>

        <div class="card">
            <h3>Version</h3>
            <p id="version">Loading...</p>
        </div>

        <div class="card">
            <h3>Uptime</h3>
            <p>99.9%</p>
        </div>

        <div class="card">
            <h3>Environment</h3>
            <p>Production</p>
        </div>
    </div>

    <div class="section">
        <h3>About Project</h3>
        <p id="about">Loading...</p>
    </div>

</div>

<script>
async function loadData() {
    const res = await fetch('/status');
    const data = await res.json();

    document.getElementById('status').innerText = data.status;
    document.getElementById('version').innerText = data.version;

    const dot = document.getElementById('dot');

    if (data.status.toLowerCase() === "running") {
        dot.classList.add("running");
    }

    const aboutRes = await fetch('/about');
    const aboutData = await aboutRes.json();
    document.getElementById('about').innerText = aboutData.message;
}

loadData();
</script>

</body>
</html>
